  <title>Contato</title>
</head>

<body>

  <nav class="header-nav">
    <div class="logo">
      <a href="index.html"><img src="../assets/logo.png" alt="brasão" /></a>
    </div>
    <ul>
      <li><a href="camisas.html">Camisas</a></li>
      <li><a href="contato.html">Contato</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li class="header-conta">
        <a href="conta.html"><img src="../assets/user.png" alt="" /> Conta</a>
      </li>
    </ul>
  </nav>
</header>

<!-- Container do formulario -->
<main class="container boxformulario">
  <!-- Container do cabecalho do formulario -->
  <div class="box-contato">
    <box class="cabecalho">
      <h1 class="texto-cabecalho">Faça Seu Cadastro</h1>
    </box>
  </div>
  <!-- Container do conteudo do formulairo -->
  <div class="formulario">
    <div class="campo-input">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" placeholder="Ex: Maria Clara" />
    </div>
    <div class="campo-input">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" placeholder="Ex: 000.000.000-00" />
    </div>
    <div class="campo-input">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" placeholder="Ex: (00) 00000-0000" />
    </div>
    <div class="campo-input">
      <label for="CEP">CEP</label>
      <input type="number" id="CEP" placeholder="Ex: 25.651-000" />
    </div>
    <div class="campo-input">
      <label for="numero">Número</label>
      <input type="text" id="numero" placeholder="Ex: 333" />
    </div>
    <div class="campo-input">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" placeholder="Ex: Rua Afrânio Melo Franco" />
    </div>
    <div class="campo-input">
      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" placeholder="Ex: Petrópolis" />
    </div>
    <div class="campo-input">
      <label for="estado">Estado</label>
      <select id="estado" name="estado">
        <option value="" disabled selected>Selecione a UF</option>
        <option value="AC">Acre (AC)</option>
        <option value="AL">Alagoas (AL)</option>
        <option value="AP">Amapá (AP)</option>
        <option value="AM">Amazonas (AM)</option>
        <option value="BA">Bahia (BA)</option>
        <option value="CE">Ceará (CE)</option>
        <option value="DF">Distrito Federal (DF)</option>
        <option value="ES">Espírito Santo (ES)</option>
        <option value="GO">Goiás (GO)</option>
        <option value="MA">Maranhão (MA)</option>
        <option value="MT">Mato Grosso (MT)</option>
        <option value="MS">Mato Grosso do Sul (MS)</option>
        <option value="MG">Minas Gerais (MG)</option>
        <option value="PA">Pará (PA)</option>
        <option value="PB">Paraíba (PB)</option>
        <option value="PR">Paraná (PR)</option>
        <option value="PE">Pernambuco (PE)</option>
        <option value="PI">Piauí (PI)</option>
        <option value="RJ">Rio de Janeiro (RJ)</option>
        <option value="RN">Rio Grande do Norte (RN)</option>
        <option value="RS">Rio Grande do Sul (RS)</option>
        <option value="RO">Rondônia (RO)</option>
        <option value="RR">Roraima (RR)</option>
        <option value="SC">Santa Catarina (SC)</option>
        <option value="SP">São Paulo (SP)</option>
        <option value="SE">Sergipe (SE)</option>
        <option value="TO">Tocantins (TO)</option>
      </select>
    </div>
    <div class="campo-input">
      <label for="email">E-mail de Contato</label>
      <input type="email" id="email" placeholder="mariaclara@email.com">
    </div>
    <!-- Botão para salvar cadastro -->
    <button type="submit" class="btn">
      Salvar Cadastro
    </button>
  </div>
  <!-- Container do conteudo da box fale conosco -->
  <div class="fale-conosco">
    <h1 class="txtfaleconosco">Fale Conosco</h1>
    <div class="redes">
      <img class="logo-fale-conosco" src="https://img.shields.io/badge/Gmail-333333?style=for-the-badge&logo=gmail&logoColor=red" alt="">
      <img class="logo-fale-conosco" src="https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white" alt="">
      <img class="logo-fale-conosco" src="https://img.shields.io/badge/WhatsApp-25D366?style=for-the-badge&logo=whatsapp&logoColor=white" alt="">
    </div>
  </div>
</main>
